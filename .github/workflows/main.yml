name: Daily Server Update
on:
  schedule:
    - cron: '0 1 * * *' # كيخدم مع 1 ديال الصباح كل نهار
  workflow_dispatch: # زر لتشغيله يدوياً للتجربة

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Scraper
        env:
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
        run: python script.py
