name: Update Ncam Server

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *' # كايخدم بوحدو كل 6 سوايع
  workflow_dispatch:      # بوطون باش تخدمو يدويّاً وقتما بغيتي

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Scraper and Decoder
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ncam.server
          
          # هاد السطر هو "الفكاك" ديال المشكل
          # كايشوف واش كاين شي تغيير، إيلا ماكاينش كايخرج بسلام بلا Error
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
