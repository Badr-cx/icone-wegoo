name: Scrapy Update via Tor

on:
  schedule:
    - cron: '30 0 * * *' # كايخدم كل نهار مع 00:30
  workflow_dispatch:   # تشغيل يدوي

jobs:
  run-scrapy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Tor and Privoxy
        run: |
          sudo apt-get update
          sudo apt-get install -y tor privoxy
          # إعداد Privoxy باش يصيفط الترافيك لـ Tor (SOCKS5)
          echo "forward-socks5t / 127.0.0.1:9050 ." | sudo tee -a /etc/privoxy/config
          sudo service tor start
          sudo service privoxy restart
          sleep 10 # وقت كافي للربط

      - name: Install Scrapy
        run: pip install scrapy

      - name: Run Scrapy Spider
        run: python scraper.py
        env:
          # البروكسي ديال Privoxy اللي غايدوز من Tor
          http_proxy: "http://127.0.0.1:8118"
          https_proxy: "http://127.0.0.1:8118"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ncam.server
          git commit -m "Update ncam.server via Scrapy/Tor - $(date)" || exit 0
          git push
