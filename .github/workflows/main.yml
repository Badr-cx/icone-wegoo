name: Update Ncam Servers

on:
  schedule:
    - cron: '0 */6 * * *' # كيخدم بوحدو كل 6 سوايع
  workflow_dispatch:      # كيعطيك بوطون باش تخدمو يدويّاً وقتما بغيتي

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper and Decoder
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ncam.server
          
          # هادا هو السر باش ما يعطيكش Error إيلا كان الملف هو هو
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Update servers: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
